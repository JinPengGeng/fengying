name: Generate Clash Subscription
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate clash.yaml
        run: python3 generate.py

      - name: Commit and push
        run: |
          git config user.name "proxy-bot"
          git config user.email "proxy-bot@localhost"
          git add clash.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
